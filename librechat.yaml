# Nimbus Chat configuration.
version: 1.3.13
cache: true

# MCP servers baked in — model can use these tools by default without any
# per-user setup. LibreChat Docker image already ships uv/uvx + Node so npx
# / uvx commands work out of the box.
mcpServers:
  # Web fetch tool — models can pull arbitrary URLs and extract content.
  fetch:
    command: uvx
    args:
      - mcp-server-fetch
    timeout: 30000
    initTimeout: 20000
    chatMenu: true
    description: Fetch and read the contents of any URL as markdown or plain text.

  # Structured chain-of-thought scratchpad.
  sequential-thinking:
    command: npx
    args:
      - -y
      - '@modelcontextprotocol/server-sequential-thinking'
    timeout: 60000
    initTimeout: 90000
    chatMenu: true
    description: Break a problem into ordered thinking steps before answering.

  # Current-time tool.
  time:
    command: uvx
    args:
      - mcp-server-time
      - --local-timezone=UTC
    timeout: 10000
    initTimeout: 15000
    chatMenu: true
    description: Ask for the current time in any timezone or compute time deltas.

  # Persistent key-value memory graph.
  persistent-memory:
    command: npx
    args:
      - -y
      - '@modelcontextprotocol/server-memory'
    timeout: 30000
    initTimeout: 90000
    chatMenu: true
    description: Save/read/link arbitrary facts + entities the model wants to remember.

  # Real browser control via Playwright.
  browser:
    command: npx
    args:
      - -y
      - '@playwright/mcp@latest'
      - --headless
      - --isolated
    timeout: 60000
    initTimeout: 60000
    chatMenu: true
    description: Browse the web headlessly — navigate, click, type, screenshot, extract.

# ChatGPT-style persistent memory (LibreChat native subsystem).
memory:
  disabled: false
  personalize: true
  tokenLimit: 4000
  charLimit: 20000
  validKeys:
    - preferences
    - personal_info
    - user_style
    - tech_stack
    - project_context
  agent:
    enabled: true
    provider: Nimbus
    model: anthropic/claude-haiku-4.5
    instructions: |
      You extract lasting user preferences and project context from the
      conversation to remember for future sessions. Only save what is
      genuinely stable (favorite languages, tech stack, communication
      style, ongoing projects). Never save transient details, secrets,
      or one-off requests.

# NOTE: modelSpecs (role presets like Scroll Designer, Code Reviewer, etc.)
# have been REMOVED from the primary model picker. They were skills, not
# models — cluttered the picker and confused new users. Will re-land as
# a dedicated "Skills" side panel with auto-model-selection on activation.

interface:
  privacyPolicy:
    externalUrl: 'https://nimbusapi.net/privacy'
    openNewTab: true
  termsOfService:
    externalUrl: 'https://nimbusapi.net/terms'
    openNewTab: true
    modalAcceptance: true
    modalTitle: 'Nimbus Chat Terms'
    modalContent: |
      By using Nimbus Chat you agree to Nimbus's Terms of Service and
      usage-based billing.
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  prompts: true
  bookmarks: true
  multiConvo: true
  agents: true

# Speech services — Nimbus audio catalog.
speech:
  tts:
    openai:
      url: 'https://api.nimbusapi.net/v1/audio/speech'
      apiKey: '${NIMBUS_API_KEY}'
      model: 'openai/tts'
      voices: ['alloy', 'echo', 'fable', 'onyx', 'nova', 'shimmer']
  stt:
    openai:
      url: 'https://api.nimbusapi.net/v1/audio/transcriptions'
      apiKey: '${NIMBUS_API_KEY}'
      model: 'openai/whisper'

endpoints:
  agents:
    recursionLimit: 50
    maxRecursionLimit: 100
    disableBuilder: false
    capabilities: ['execute_code', 'file_search', 'actions', 'tools', 'artifacts', 'ocr', 'chain', 'web_search']
    titleTiming: immediate
    maxCitations: 30

  custom:
    - name: 'Nimbus'
      apiKey: '${NIMBUS_API_KEY}'
      baseURL: '${NIMBUS_API_BASE_URL}'
      models:
        default:
          # Anthropic — smartest to fastest
          - 'anthropic/claude-opus-4.8'
          - 'anthropic/claude-sonnet-5'
          - 'anthropic/claude-fable-5'
          - 'anthropic/claude-haiku-4.5'
          # OpenAI — general + coding tier
          - 'openai/gpt-5.1'
          - 'openai/gpt-5.4-mini'
          - 'openai/gpt-5-codex'
          - 'openai/gpt-5.3-codex'
          - 'openai/o4-mini'
          # DeepSeek — Pro flagship + Flash newest
          - 'deepseek/deepseek-v4-pro'
          - 'deepseek/deepseek-v4-flash'
          # Moonshot — Kimi flagship + coding
          - 'moonshotai/kimi-k3'
          - 'moonshotai/kimi-k2.7-code'
          # Google — Gemini flagship + fast
          - 'google/gemini-3.1-pro-preview'
          - 'google/gemini-3-flash-preview'
        fetch: true
      titleConvo: true
      titleModel: 'anthropic/claude-haiku-4.5'
      modelDisplayLabel: 'Nimbus'
      iconURL: 'https://nimbusapi.net/favicon.ico'
      forcePrompt: false
      dropParams: ['stop']

fileConfig:
  endpoints:
    Nimbus:
      fileLimit: 20
      fileSizeLimit: 40
      totalSizeLimit: 200
      supportedMimeTypes:
        - image/.*
        - application/pdf
        - text/.*
        - application/json
